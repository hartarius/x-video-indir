<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X Video İndirici</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --card: #12121a;
  --border: #1e1e30;
  --text: #e4e4f0;
  --dim: #6b6b80;
  --accent: #1d9bf0;
  --accent-hover: #1a8cd8;
  --error: #ef4444;
  --success: #22c55e;
  --radius: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  background-image: radial-gradient(ellipse at 50% -30%, rgba(29,155,240,0.06) 0%, transparent 60%);
}

.container {
  width: 100%;
  max-width: 600px;
  text-align: center;
}

/* Logo */
.logo {
  font-size: 2.5rem;
  margin-bottom: 0.25rem;
  filter: grayscale(0);
}

h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.35rem;
}

.subtitle {
  color: var(--dim);
  font-size: 0.9rem;
  margin-bottom: 2rem;
}

/* Input area */
.input-group {
  display: flex;
  gap: 0.5rem;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.4rem;
  transition: border-color 0.2s;
}

.input-group:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(29,155,240,0.1);
}

.input-group input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 0.95rem;
  padding: 0.75rem 0.75rem;
  font-family: inherit;
}

.input-group input::placeholder {
  color: var(--dim);
}

.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 0.75rem 1.5rem;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-family: inherit;
}

.btn:hover { background: var(--accent-hover); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Result area */
.result {
  margin-top: 1.5rem;
  display: none;
}

.result.show { display: block; }

.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  text-align: left;
}

.video-info {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
  margin-bottom: 1rem;
}

.video-thumb {
  width: 120px;
  height: 68px;
  border-radius: 8px;
  object-fit: cover;
  background: #1a1a2e;
  flex-shrink: 0;
}

.video-meta {
  flex: 1;
  min-width: 0;
}

.video-title {
  font-size: 0.9rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 0.35rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.video-uploader {
  font-size: 0.8rem;
  color: var(--dim);
}

.btn-download {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  width: 100%;
  background: var(--success);
  padding: 0.85rem;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
}

.btn-download:hover { background: #1ea34e; }

/* Loading */
.spinner {
  display: none;
  width: 24px;
  height: 24px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading .spinner { display: inline-block; }
.loading .btn-text { display: none; }

/* Error */
.error-msg {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 10px;
  padding: 0.85rem;
  color: var(--error);
  font-size: 0.85rem;
  margin-top: 1rem;
  display: none;
}

.error-msg.show { display: block; }

/* Toast */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 0.75rem 1.5rem;
  font-size: 0.85rem;
  color: var(--text);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 100;
}

.toast.show {
  opacity: 1;
}

/* Footer */
.footer {
  margin-top: 2rem;
  font-size: 0.75rem;
  color: var(--dim);
  opacity: 0.6;
}

.footer a { color: var(--dim); text-decoration: none; }
.footer a:hover { color: var(--accent); }

/* Mobile */
@media (max-width: 480px) {
  body { padding: 1.25rem; }
  h1 { font-size: 1.4rem; }
  .input-group { flex-direction: column; }
  .btn { width: 100%; padding: 0.85rem; }
  .video-info { flex-direction: column; }
  .video-thumb { width: 100%; height: auto; aspect-ratio: 16/9; }
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">⬇️</div>
  <h1>X Video İndirici</h1>
  <p class="subtitle">Tweet linkini yapıştır, indir →</p>

  <div class="input-group">
    <input type="text" id="urlInput" placeholder="https://x.com/kullanici/status/123..." autocomplete="off" autofocus>
    <button class="btn" id="fetchBtn" onclick="fetchVideo()">
      <span class="btn-text">İndir</span>
      <span class="spinner"></span>
    </button>
  </div>

  <div class="error-msg" id="error"></div>

  <div class="result" id="result">
    <div class="result-card">
      <div class="video-info">
        <img class="video-thumb" id="thumb" src="" alt="Video thumbnail">
        <div class="video-meta">
          <div class="video-title" id="title"></div>
          <div class="video-uploader" id="uploader"></div>
        </div>
      </div>
      <a class="btn btn-download" id="downloadBtn" href="#" target="_blank">
        ⬇️ Videoyu İndir
      </a>
    </div>
  </div>

  <div class="footer">
    yt-dlp gücüyle • Vercel'de • <a href="https://github.com/yt-dlp/yt-dlp" target="_blank">yt-dlp</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/download';

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('result').classList.remove('show');
}

function hideError() {
  document.getElementById('error').classList.remove('show');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function fetchVideo() {
  const input = document.getElementById('urlInput');
  const btn = document.getElementById('fetchBtn');
  const url = input.value.trim();

  if (!url) {
    showError('Tweet linkini yapıştır');
    return;
  }

  if (!url.includes('x.com/') && !url.includes('twitter.com/')) {
    showError('Geçerli bir X/Twitter linki değil');
    return;
  }

  hideError();
  document.getElementById('result').classList.remove('show');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const res = await fetch(API + '?url=' + encodeURIComponent(url));
    const data = await res.json();

    if (data.error) {
      showError(data.error);
      return;
    }

    if (data.success) {
      document.getElementById('title').textContent = data.title || 'X Videosu';
      document.getElementById('uploader').textContent = data.uploader ? '@' + data.uploader : '';
      document.getElementById('thumb').src = data.thumbnail || '';
      document.getElementById('downloadBtn').href = data.url;
      document.getElementById('result').classList.add('show');
      showToast('✅ Video hazır!');
    }
  } catch (err) {
    showError('Bağlantı hatası, tekrar dene');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// Enter key to submit
document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') fetchVideo();
});

// Auto-paste from clipboard on focus if input is empty
document.getElementById('urlInput').addEventListener('focus', async function() {
  if (!this.value) {
    try {
      const text = await navigator.clipboard.readText();
      if (text.includes('x.com/') || text.includes('twitter.com/')) {
        this.value = text;
        showToast('📋 Link panodan alındı');
      }
    } catch {}
  }
});
</script>

</body>
</html>
